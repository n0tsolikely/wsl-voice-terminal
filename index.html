<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WSL Voice Terminal</title>
    <link rel="stylesheet" href="./node_modules/xterm/css/xterm.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        --terminal-frame-padding: 12px;
        --terminal-scrollbar-width: 16px;
        --terminal-scrollbar-gap: 6px;
        --hud-right-offset: calc(
          var(--terminal-frame-padding) + var(--terminal-scrollbar-width) +
            var(--terminal-scrollbar-gap) + 8px
        );
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111111;
      }

      body {
        position: relative;
      }

      #terminalShell {
        position: absolute;
        inset: var(--terminal-frame-padding);
        overflow: hidden;
      }

      #terminal {
        width: 100%;
        height: 100%;
      }

      #terminal .xterm,
      #terminal .xterm-viewport {
        height: 100%;
      }

      #terminal .xterm-viewport {
        scrollbar-gutter: stable;
        scrollbar-width: auto;
        scrollbar-color: rgba(255, 255, 255, 0.42) rgba(255, 255, 255, 0.08);
      }

      #terminal .xterm-viewport::-webkit-scrollbar {
        width: var(--terminal-scrollbar-width);
      }

      #terminal .xterm-viewport::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 999px;
      }

      #terminal .xterm-viewport::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.42);
        border: 3px solid rgba(17, 17, 17, 0.92);
        border-radius: 999px;
      }

      #terminal .xterm-viewport::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.56);
      }

      #terminal .xterm-selection {
        pointer-events: none;
        clip-path: inset(0 calc(var(--terminal-scrollbar-width) + var(--terminal-scrollbar-gap)) 0 0);
      }

      #overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      #updatePrompt {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        opacity: 0;
        pointer-events: none;
        background: rgba(5, 5, 5, 0.18);
        transition: opacity 160ms ease;
      }

      #updatePrompt[data-visible="true"] {
        opacity: 1;
        pointer-events: auto;
      }

      #updatePromptCard {
        width: min(440px, calc(100vw - 40px));
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px 18px 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        background: rgba(9, 9, 9, 0.92);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(18px);
      }

      #updatePromptTitle {
        margin: 0;
        color: #f6f6f6;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      #updatePromptMessage {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        font-size: 13px;
        line-height: 1.55;
      }

      #updatePromptMeta {
        color: rgba(255, 255, 255, 0.52);
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      #updatePromptActions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .updatePromptButton {
        min-height: 38px;
        padding: 0 16px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.82);
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease,
          opacity 140ms ease;
      }

      .updatePromptButton:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.28);
      }

      .updatePromptButton[data-variant="primary"] {
        border-color: rgba(181, 199, 255, 0.42);
        background: rgba(91, 124, 255, 0.22);
        color: #dbe5ff;
      }

      .updatePromptButton:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
      }

      #hudRail {
        position: absolute;
        top: var(--terminal-frame-padding);
        right: var(--hud-right-offset);
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      #controlDrawer {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        pointer-events: auto;
      }

      #hudTopRow {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #drawerToggle {
        min-height: 34px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(8, 8, 8, 0.86);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(16px);
        color: rgba(255, 255, 255, 0.82);
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease;
      }

      #drawerToggle:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.28);
      }

      #drawerToggle::after {
        content: "+";
        font-size: 14px;
        line-height: 1;
        opacity: 0.74;
      }

      #controlDrawer[data-open="true"] #drawerToggle::after {
        content: "-";
      }

      #replyHistoryToggle,
      #speechToggleButton {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(8, 8, 8, 0.86);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(16px);
        color: rgba(255, 255, 255, 0.78);
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease,
          color 140ms ease;
      }

      #replyHistoryToggle:hover,
      #speechToggleButton:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.28);
      }

      #replyHistoryToggle[data-active="true"] {
        border-color: rgba(181, 199, 255, 0.42);
        background: rgba(91, 124, 255, 0.2);
        color: #dbe5ff;
      }

      #speechToggleButton[data-active="true"] {
        border-color: rgba(181, 199, 255, 0.42);
        background: rgba(91, 124, 255, 0.2);
        color: #dbe5ff;
      }

      #speechToggleButton[data-active="false"] {
        color: rgba(255, 255, 255, 0.56);
      }

      #speechToggleButton svg {
        width: 15px;
        height: 15px;
      }

      #replyHistory {
        width: min(320px, calc(100vw - 96px));
        max-height: 32vh;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      #replyHistory[hidden] {
        display: none;
      }

      #replyHistory[data-visible="true"] {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }

      .replyItem {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 10px 10px 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        background: rgba(8, 8, 8, 0.82);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(16px);
      }

      .replyText {
        flex: 1;
        color: rgba(255, 255, 255, 0.82);
        font-size: 11px;
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .replySpeakButton {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(145, 191, 255, 0.28);
        border-radius: 999px;
        background: rgba(91, 124, 255, 0.16);
        color: #dbe5ff;
        font: inherit;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease,
          opacity 140ms ease;
      }

      .replySpeakButton:hover {
        transform: translateY(-1px);
        border-color: rgba(181, 199, 255, 0.42);
        background: rgba(91, 124, 255, 0.24);
      }

      .replySpeakButton[data-active="true"] {
        border-color: rgba(181, 199, 255, 0.52);
        background: rgba(91, 124, 255, 0.3);
      }

      .replySpeakButton:disabled {
        cursor: wait;
        opacity: 0.6;
        transform: none;
      }

      .replySpeakButton svg {
        width: 14px;
        height: 14px;
      }

      #controlPanel {
        width: min(260px, calc(100vw - 96px));
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        background: rgba(8, 8, 8, 0.86);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(16px);
        pointer-events: none;
        opacity: 0;
        transform: translateY(-8px) scale(0.96);
        transform-origin: top right;
        max-height: 0;
        overflow: hidden;
        transition:
          opacity 160ms ease,
          transform 160ms ease,
          max-height 180ms ease;
      }

      #controlDrawer[data-open="true"] #controlPanel {
        pointer-events: auto;
        opacity: 1;
        transform: none;
        max-height: 280px;
      }

      #statusDock {
        position: absolute;
        right: var(--hud-right-offset);
        bottom: 104px;
        max-width: min(360px, calc(100vw - 104px));
        pointer-events: none;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      #statusDock[hidden] {
        display: none;
      }

      #statusDock[data-visible="true"] {
        opacity: 1;
        transform: none;
      }

      #status {
        min-width: 200px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(8, 8, 8, 0.86);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.26);
        backdrop-filter: blur(16px);
        color: #f3f3f3;
        font-size: 12px;
        letter-spacing: 0.02em;
        line-height: 1.4;
      }

      #status[data-tone="error"] {
        color: #ffb0b0;
        border-color: rgba(255, 149, 149, 0.3);
        background: rgba(44, 10, 10, 0.9);
      }

      #modeDetail {
        min-height: 28px;
        color: rgba(255, 255, 255, 0.66);
        font-size: 11px;
        letter-spacing: 0.015em;
        line-height: 1.45;
      }

      #modeDetail[data-tone="muted"] {
        color: rgba(255, 229, 180, 0.78);
      }

      #meter {
        display: none;
      }

      #modeSelector {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      #actionRow {
        display: grid;
        gap: 8px;
      }

      .modeButton {
        min-height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.82);
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          color 140ms ease,
          transform 140ms ease;
      }

      .modeButton:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.28);
      }

      .modeButton[data-selected="true"] {
        border-color: rgba(255, 184, 120, 0.45);
        background: rgba(255, 173, 92, 0.18);
        color: #fff1d6;
      }

      .modeButton:disabled {
        cursor: default;
        transform: none;
      }

      .modeButton[data-supported="false"] {
        color: rgba(255, 255, 255, 0.42);
      }

      #speakerButton {
        min-height: 36px;
        width: 100%;
        padding: 0 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(91, 124, 255, 0.14);
        color: #dbe5ff;
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease;
      }

      #speakerButton:hover {
        transform: translateY(-1px);
        border-color: rgba(181, 199, 255, 0.35);
        background: rgba(91, 124, 255, 0.22);
      }

      #speakerButton:disabled {
        cursor: wait;
        opacity: 0.62;
        transform: none;
      }

      #micButton {
        --mic-level: 0;
        width: 60px;
        height: 60px;
        position: absolute;
        right: var(--hud-right-offset);
        bottom: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        background: rgba(14, 14, 14, 0.86);
        color: #ffffff;
        cursor: pointer;
        pointer-events: auto;
        overflow: visible;
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.35);
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          background 120ms ease;
      }

      #micButton::before {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: inherit;
        background: radial-gradient(circle, rgba(255, 186, 94, 0.24), rgba(255, 186, 94, 0));
        opacity: calc(0.14 + var(--mic-level) * 0.52);
        transform: scale(calc(0.92 + var(--mic-level) * 0.28));
        transition:
          transform 70ms linear,
          opacity 70ms linear,
          background 140ms ease;
      }

      #micButton::after {
        content: "";
        position: absolute;
        inset: -2px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: inherit;
        opacity: calc(0.18 + var(--mic-level) * 0.24);
        transform: scale(calc(1 + var(--mic-level) * 0.08));
        transition:
          transform 70ms linear,
          opacity 70ms linear,
          border-color 140ms ease;
      }

      #micButton:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.34);
      }

      #micButton[data-state="recording"] {
        background: rgba(160, 26, 26, 0.94);
        border-color: rgba(255, 152, 152, 0.65);
      }

      #micButton[data-state="recording"]::before {
        background: radial-gradient(circle, rgba(255, 110, 110, 0.32), rgba(255, 110, 110, 0));
      }

      #micButton[data-state="armed"] {
        background: rgba(21, 93, 79, 0.94);
        border-color: rgba(129, 237, 207, 0.46);
      }

      #micButton[data-state="armed"]::before {
        background: radial-gradient(circle, rgba(129, 237, 207, 0.28), rgba(129, 237, 207, 0));
      }

      #micButton[data-state="transcribing"] {
        background: rgba(128, 88, 16, 0.94);
        border-color: rgba(255, 218, 133, 0.52);
      }

      #micButton[data-state="playing"] {
        background: rgba(31, 60, 121, 0.94);
        border-color: rgba(145, 191, 255, 0.48);
      }

      #micButton[data-state="playing"]::before {
        background: radial-gradient(circle, rgba(145, 191, 255, 0.28), rgba(145, 191, 255, 0));
      }

      #micButton[data-monitoring="true"]::after {
        border-color: rgba(255, 255, 255, 0.16);
      }

      #micButton[data-listening="true"] {
        transform: translateY(-1px) scale(calc(1 + var(--mic-level) * 0.04));
      }

      #micButton:disabled {
        cursor: default;
        transform: none;
      }

      #micButton:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.8);
        outline-offset: 3px;
      }

      #micButton svg {
        position: relative;
        z-index: 1;
        width: 28px;
        height: 28px;
        transform: scale(calc(1 + var(--mic-level) * 0.08));
        transition: transform 70ms linear;
      }

      @media (max-width: 920px) {
        #hudRail {
          top: 10px;
          right: 10px;
        }

        #statusDock {
          right: 10px;
          left: 10px;
          bottom: 96px;
          max-width: none;
        }

        #controlPanel,
        #replyHistory {
          width: min(100vw - 20px, 320px);
        }

        #micButton {
          right: 10px;
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="terminalShell">
      <div id="terminal"></div>
    </div>
    <div id="overlay">
      <div id="updatePrompt" data-visible="false" hidden>
        <div id="updatePromptCard" role="dialog" aria-modal="true" aria-labelledby="updatePromptTitle">
          <h2 id="updatePromptTitle">Update Available</h2>
          <p id="updatePromptMessage"></p>
          <div id="updatePromptMeta"></div>
          <div id="updatePromptActions">
            <button id="updatePromptDismiss" class="updatePromptButton" type="button">No</button>
            <button
              id="updatePromptConfirm"
              class="updatePromptButton"
              data-variant="primary"
              type="button"
            >
              Yes, update
            </button>
          </div>
        </div>
      </div>
      <div id="hudRail">
        <div id="controlDrawer" data-open="false">
          <div id="hudTopRow">
            <button
              id="replyHistoryToggle"
              type="button"
              aria-pressed="false"
              aria-label="Keep recent reply playback controls visible"
              title="Keep recent reply playback controls visible"
            >
              R
            </button>
            <button
              id="speechToggleButton"
              type="button"
              aria-pressed="true"
              aria-label="Turn off spoken assistant replies"
              title="Turn off spoken assistant replies"
              data-active="true"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M5 10.5V13.5H8.5L13 18V6L8.5 10.5H5Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linejoin="round"
                />
                <path
                  d="M16 9C17.333 10.167 18 11.5 18 13C18 14.5 17.333 15.833 16 17"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <button
              id="drawerToggle"
              type="button"
              aria-expanded="false"
              aria-controls="controlPanel"
            >
              Voice: Click
            </button>
          </div>
          <div id="controlPanel">
            <div id="modeDetail">Click once to record. Click again or press Enter to stop.</div>
            <div id="meter" aria-hidden="true">
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
              <span class="meterBar"></span>
            </div>
            <div id="actionRow">
              <div id="modeSelector" aria-label="Microphone mode">
                <button class="modeButton" data-mode="hold" type="button">PTT</button>
                <button class="modeButton" data-mode="toggle" type="button">Click</button>
                <button class="modeButton" data-mode="auto" type="button">Auto</button>
              </div>
              <button id="speakerButton" type="button">Test Voice</button>
            </div>
          </div>
        </div>
        <div id="replyHistory" aria-live="polite" hidden></div>
      </div>
      <div id="statusDock" data-visible="false" hidden>
        <div id="status" aria-live="polite">Click mic to talk. Press Enter to stop.</div>
      </div>
      <button id="micButton" type="button" aria-label="PTT: hold to dictate">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M12 16a4 4 0 0 0 4-4V7a4 4 0 1 0-8 0v5a4 4 0 0 0 4 4Z"
            stroke="currentColor"
            stroke-width="1.7"
          />
          <path
            d="M5 11.5a7 7 0 0 0 14 0M12 18.5V22M8.5 22h7"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>
    <script src="./node_modules/xterm/lib/xterm.js"></script>
    <script src="./node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./lib/mic-state.js"></script>
    <script src="./lib/dev-dictionary.js"></script>
    <script src="./lib/dictation-buffer.js"></script>
    <script src="./lib/ui-vaporize.js"></script>
    <script src="./mic-controls.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
